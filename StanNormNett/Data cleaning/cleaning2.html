<!DOCTYPE html>

<style>
:root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3f;--a1:#ff3c78;--a2:#00e5ff;--a3:#aaff00;--a4:#ff9d00;--a5:#bf80ff;--text:#e8e8f5;--muted:#6b6b8a;--fm:'Space Mono',monospace;--fd:'Syne',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--fm);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,60,120,.07),transparent 70%);pointer-events:none;z-index:0;animation:orb 9s ease-in-out infinite alternate;}
@keyframes orb{from{transform:translate(0,0) scale(1);}to{transform:translate(-80px,100px) scale(1.2);}}
@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.ctn{position:relative;z-index:1;max-width:1380px;margin:0 auto;padding:36px 24px;}
.tag{display:inline-block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--a2);border:1px solid var(--a2);padding:4px 10px;margin-bottom:14px;}
h1{font-family:var(--fd);font-size:clamp(28px,5vw,60px);font-weight:800;line-height:.95;letter-spacing:-2px;color:#fff;margin-bottom:6px;}
h1 span{-webkit-text-stroke:1px var(--a1);-webkit-text-fill-color:transparent;}
.hrow{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:36px;}
.hdesc{font-size:11px;color:var(--muted);line-height:1.8;max-width:440px;}
.subnav{display:flex;gap:4px;flex-wrap:wrap;}
.snbtn{font-family:var(--fm);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.snbtn:hover{border-color:var(--a2);color:var(--a2);}
.snbtn.cur{border-color:var(--a1);color:var(--a1);background:rgba(255,60,120,.06);}
label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;}
select,input[type=text]{font-family:var(--fm);font-size:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;outline:none;transition:border-color .2s;cursor:pointer;}
select:focus,input[type=text]:focus{border-color:var(--a2);}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:5px;}
.panel{background:var(--card);border:1px solid var(--border);padding:24px;position:relative;animation:fu .4s ease both;margin-bottom:20px;}
.plabel{position:absolute;top:-10px;left:20px;background:var(--bg);font-size:10px;letter-spacing:2px;padding:0 8px;text-transform:uppercase;}
/* CATEGORY TABS */
.cattabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:22px;}
.ctab{font-family:var(--fm);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:8px 14px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;position:relative;}
.ctab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;transform:scaleX(0);transition:transform .25s;}
.ctab:hover::after,.ctab.on::after{transform:scaleX(1);}
.ctab.on,.ctab:hover{color:#fff;}
.ctab.cc1::after{background:var(--a1);} .ctab.cc1.on{border-color:var(--a1);}
.ctab.cc2::after{background:var(--a4);} .ctab.cc2.on{border-color:var(--a4);}
.ctab.cc3::after{background:var(--a1);} .ctab.cc3.on{border-color:var(--a1);}
.ctab.cc4::after{background:var(--a4);} .ctab.cc4.on{border-color:var(--a4);}
.ctab.cc5::after{background:var(--a5);} .ctab.cc5.on{border-color:var(--a5);}
.ctab.cc6::after{background:var(--a5);} .ctab.cc6.on{border-color:var(--a5);}
.ctab.cc7::after{background:var(--a2);} .ctab.cc7.on{border-color:var(--a2);}
.ctab.cc8::after{background:var(--a3);} .ctab.cc8.on{border-color:var(--a3);}
.ctab.cc9::after{background:var(--a2);} .ctab.cc9.on{border-color:var(--a2);}
.ctab.cc10::after{background:var(--a5);} .ctab.cc10.on{border-color:var(--a5);}
.ctab.cc11::after{background:var(--a4);} .ctab.cc11.on{border-color:var(--a4);}
/* STATS CHIPS */
.chips{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0;}
.chip{background:var(--surface);border:1px solid var(--border);padding:10px 16px;min-width:90px;}
.chip-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.chip-val{font-family:var(--fd);font-size:18px;font-weight:800;}
.ca1{color:var(--a1);}.ca2{color:var(--a2);}.ca3{color:var(--a3);}.ca4{color:var(--a4);}.ca5{color:var(--a5);}.cw{color:var(--text);}
/* BEFORE/AFTER GRID */
.bagrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:900px){.bagrid{grid-template-columns:1fr;}}
.bapanel{background:var(--surface);border:1px solid var(--border);padding:16px;}
.ba-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid var(--border);}
.ba-title.bef{color:var(--a4);} .ba-title.aft{color:var(--a3);}
/* TABLES */
.twrap{overflow-x:auto;overflow-y:auto;max-height:400px;}
.dtbl{width:100%;border-collapse:collapse;font-size:11px;}
.dtbl th{background:var(--bg);color:var(--a2);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;white-space:nowrap;text-align:center;}
.dtbl td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03);text-align:center;white-space:nowrap;}
.dtbl tr:hover td{background:rgba(255,255,255,.02);}
.idx{color:var(--muted);font-size:9px;}
/* CELL STATES */
.c-null{color:var(--a1)!important;font-style:italic;font-weight:700;}
.c-dup{background:rgba(255,60,120,.06)!important;}
.c-dup td{color:rgba(255,60,120,.7)!important;}
.c-removed{opacity:.22;text-decoration:line-through;}
.c-imputed{color:var(--a3)!important;font-weight:700;background:rgba(170,255,0,.07)!important;}
.c-outlier{color:var(--a1)!important;font-weight:700;background:rgba(255,60,120,.09)!important;}
.c-capped{color:var(--a4)!important;font-weight:700;background:rgba(255,157,0,.08)!important;}
.c-type{color:var(--a4)!important;font-weight:700;background:rgba(255,157,0,.08)!important;}
.c-text{color:var(--a5)!important;font-weight:700;background:rgba(191,128,255,.08)!important;}
.c-space{color:var(--a5)!important;font-weight:700;background:rgba(191,128,255,.08)!important;}
.c-log{color:var(--a2)!important;font-weight:700;background:rgba(0,229,255,.07)!important;}
.c-scale{color:var(--a3)!important;font-weight:700;background:rgba(170,255,0,.07)!important;}
/* NEW CELL CLASSES */
.c-date{color:var(--a2)!important;font-weight:700;background:rgba(0,229,255,.07)!important;}
.c-date-new{color:var(--a2)!important;font-weight:700;background:rgba(0,229,255,.12)!important;}

.c-sem-bad{color:var(--a1)!important;font-weight:700;background:rgba(255,60,120,.09)!important;}
/* EXPLAIN BOX */
.explain{background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.15);padding:12px 16px;font-size:11px;color:var(--a2);line-height:1.8;margin-bottom:16px;}
/* LEGEND */

/* CONSTANT INPUT */

.const-row input:focus{border-color:var(--a2);}

/* ════════════════════════════════════════════════
   UTILS (global, no scope issues)
════════════════════════════════════════════════ */
function isNull(v) { return v === null || v === undefined; }
function isStrNum(v) { return typeof v === 'string' && v.trim() !== '' && !isNaN(Number(v.trim())); }
function hasSpace(v) { return typeof v === 'string' && v !== v.trim(); }

function numArr(rows, col) {
  var a = [];
  for (var i = 0; i < rows.length; i++) {
    var v = rows[i][col];
    if (!isNull(v) && !isNaN(Number(v))) a.push(Number(v));
  }
  return a;
}
function colMean(rows, col) {
  var a = numArr(rows, col);
  if (!a.length) return null;
  var s = 0; for (var i = 0; i < a.length; i++) s += a[i];
  return s / a.length;
}
function colMedian(rows, col) {
  var a = numArr(rows, col).sort(function(x,y){return x-y;});
  if (!a.length) return null;
  var m = Math.floor(a.length / 2);
  return a.length % 2 === 0 ? (a[m-1]+a[m])/2 : a[m];
}
function colMode(rows, col) {
  var freq = {};
  for (var i = 0; i < rows.length; i++) {
    var v = rows[i][col];
    if (!isNull(v)) { var k = String(v); freq[k] = (freq[k]||0)+1; }
  }
  var best = null, bestN = 0;
  var keys = Object.keys(freq);
  for (var i = 0; i < keys.length; i++) { if (freq[keys[i]] > bestN) { bestN=freq[keys[i]]; best=keys[i]; } }
  return best;
}
function colStd(rows, col) {
  var a = numArr(rows, col);
  if (!a.length) return 0;
  var mu = 0; for (var i=0;i<a.length;i++) mu+=a[i]; mu/=a.length;
  var v = 0; for (var i=0;i<a.length;i++) v+=(a[i]-mu)*(a[i]-mu);
  return Math.sqrt(v/a.length);
}
/* BUG2 FIX: correct quartile indexing using (n-1)*p */
function iqrBounds(rows, col) {
  var a = numArr(rows, col).sort(function(x,y){return x-y;});
  if (a.length < 4) return null;
  var q1 = a[Math.floor((a.length-1)*0.25)];
  var q3 = a[Math.floor((a.length-1)*0.75)];
  var iqr = q3 - q1;
  return {lo: q1-1.5*iqr, hi: q3+1.5*iqr};
}
/* BUG5 FIX: use JSON for reliable deep clone */
function deepClone(rows) {
  return JSON.parse(JSON.stringify(rows));
}
/* BUG1 FIX: fmtVal uses explicit null check, not isNull reference */
function fmtVal(v) {
  if (v === null || v === undefined) return '<span class="c-null">null</span>';
  if (typeof v === 'number') {
    /* integers: no decimals */
    if (v === Math.floor(v) && Math.abs(v) < 1e15) return String(v);
    var abs = Math.abs(v);
    var dec = (abs < 10) ? 4 : (abs < 1000) ? 2 : 0;
    return v.toFixed(dec);
  }
  return String(v);
}
function fmtNum(v) {
  if (typeof v !== 'number') return String(v);
  /* integers: never add decimals */
  if (v === Math.floor(v) && Math.abs(v) < 1e15) return String(v);
  var abs = Math.abs(v);
  /* small decimals: 4 places; medium: 2 places; large: 0 (already integer-like) */
  var dec = (abs < 10) ? 4 : (abs < 1000) ? 2 : 0;
  return v.toFixed(dec);
}

/* DATE UTILS ── for category 9 */
function parseDate(str) {
  if (!str || str === 'null') return null;
  str = String(str).trim();
  /* ISO: 2024-01-15 */
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  /* FR: 15/01/2024 */
  var mFR = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (mFR) return mFR[3]+'-'+mFR[2]+'-'+mFR[1];
  /* Dashes FR: 22-01-2024 */
  var mDash = str.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (mDash) return mDash[3]+'-'+mDash[2]+'-'+mDash[1];
  /* Month letters: 18-Jan-2024 */
  var MONTHS = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  var mLet = str.match(/^(\d{2})-([A-Za-z]{3})-(\d{4})$/);
  if (mLet) { var mo=MONTHS[mLet[2].toLowerCase()]; if(mo) return mLet[3]+'-'+mo+'-'+mLet[1]; }
  return str; /* fallback unchanged */
}
function dateDiffDays(d1, d2) {
  if (!d1 || !d2) return null;
  var a = new Date(d1), b = new Date(d2);
  if (isNaN(a)||isNaN(b)) return null;
  return Math.round((b-a)/(1000*60*60*24));
}

function applyMethod(dsId, method) {
  var ds   = DS[dsId];
  var orig = ds.rows;
  var rows = deepClone(orig);
  var marks = {};
  var removedSet = {};
  var extraCols = []; /* for methods that add new columns */

  function setMark(ri, col, cls) {
    if (!marks[ri]) marks[ri] = {};
    marks[ri][col] = cls;
  }

  /* ── 1a. DROP ROWS ── */
  if (method === 'drop_rows') {
    var kept = [];
    for (var i = 0; i < rows.length; i++) {
      var bad = false;
      for (var j = 0; j < ds.cols.length; j++) { if (isNull(rows[i][ds.cols[j]])) { bad=true; break; } }
      if (bad) removedSet[i] = true;
      else kept.push(rows[i]);
    }
    return {after:kept, marks:marks, removedSet:removedSet, extraCols:[]};
  }

  /* ── 1b. IMPUTATION ── */
  if (method === 'imp_mean' || method === 'imp_median' || method === 'imp_mode' || method === 'imp_const') {
    var constV = document.getElementById('constVal').value;
    for (var c = 0; c < ds.cols.length; c++) {
      var col = ds.cols[c];
      if (col === 'id') continue;
      var fillVal;
      if (method === 'imp_mean')        fillVal = colMean(orig, col);
      else if (method === 'imp_median') fillVal = colMedian(orig, col);
      else if (method === 'imp_mode')   fillVal = colMode(orig, col);
      else                              fillVal = constV;
      if (fillVal === null) continue;
      for (var i = 0; i < rows.length; i++) {
        if (isNull(rows[i][col])) { rows[i][col] = fillVal; setMark(i, col, 'c-imputed'); }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  /* ── 2. DUPLICATES ── BUG3 FIX: null-safe key */
  if (method === 'drop_dup') {
    var seen = {}, kept = [];
    for (var i = 0; i < rows.length; i++) {
      var parts = [];
      for (var c = 0; c < ds.cols.length; c++) {
        if (ds.cols[c] === 'id') continue;
        var kv = rows[i][ds.cols[c]];
        var seg;
        if (isNull(kv)) {
          /* null is unique per column position — two rows both having null in col c
             ARE duplicates of each other (same column, same missing value) */
          seg = '__NULL__';
        } else if (typeof kv === 'number') {
          /* canonical numeric: avoid "800" vs 800 mismatch */
          seg = String(Number(kv));
        } else if (typeof kv === 'string') {
          /* normalize: trim whitespace + lowercase for case-insensitive comparison */
          seg = kv.trim().toLowerCase();
          /* if the trimmed string is a pure number, canonicalize it too */
          if (seg !== '' && !isNaN(Number(seg))) seg = String(Number(seg));
        } else {
          seg = String(kv);
        }
        /* use a separator that cannot appear in values to avoid collision */
        parts.push(seg);
      }
      var key = parts.join('\x00');
      if (seen[key] !== undefined) { removedSet[i] = true; }
      else { seen[key] = i; kept.push(rows[i]); }
    }
    return {after:kept, marks:marks, removedSet:removedSet, extraCols:[]};
  }

  /* ── 3. OUTLIERS ── */
  if (method === 'out_drop' || method === 'out_cap' || method === 'out_median') {
    var bounds = {}, meds = {};
    for (var c = 0; c < ds.numCols.length; c++) {
      bounds[ds.numCols[c]] = iqrBounds(orig, ds.numCols[c]);
      meds[ds.numCols[c]]   = colMedian(orig, ds.numCols[c]);
    }
    if (method === 'out_drop') {
      var kept = [];
      for (var i = 0; i < rows.length; i++) {
        var bad = false;
        for (var c = 0; c < ds.numCols.length; c++) {
          var col = ds.numCols[c]; var b = bounds[col]; var v = rows[i][col];
          if (b && !isNull(v) && (v < b.lo || v > b.hi)) { bad=true; break; }
        }
        if (bad) removedSet[i] = true; else kept.push(rows[i]);
      }
      return {after:kept, marks:marks, removedSet:removedSet, extraCols:[]};
    }
    for (var i = 0; i < rows.length; i++) {
      for (var c = 0; c < ds.numCols.length; c++) {
        var col = ds.numCols[c]; var b = bounds[col]; var v = rows[i][col];
        if (b && !isNull(v) && (v < b.lo || v > b.hi)) {
          rows[i][col] = (method === 'out_cap') ? Math.max(b.lo, Math.min(b.hi, v)) : meds[col];
          setMark(i, col, 'c-capped');
        }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  /* ── 4. TYPE CONVERSION ── */
  if (method === 'to_num') {
    for (var i = 0; i < rows.length; i++) {
      for (var c = 0; c < ds.numCols.length; c++) {
        var col = ds.numCols[c];
        if (isStrNum(rows[i][col])) { rows[i][col] = Number(rows[i][col]); setMark(i, col, 'c-type'); }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  /* ── 5. TEXT ── */
  if (method === 'txt_lower' || method === 'txt_upper' || method === 'txt_cap') {
    for (var i = 0; i < rows.length; i++) {
      for (var c = 0; c < ds.catCols.length; c++) {
        var col = ds.catCols[c]; var v = rows[i][col];
        if (typeof v === 'string') {
          var nv;
          if (method === 'txt_lower') nv = v.toLowerCase();
          else if (method === 'txt_upper') nv = v.toUpperCase();
          else nv = v.toLowerCase().replace(/(^|\s)\S/g, function(ch){ return ch.toUpperCase(); });
          if (nv !== v) { rows[i][col] = nv; setMark(i, col, 'c-text'); }
        }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  /* ── 6. TRIM ── BUG4 FIX: typeof check already in hasSpace() */
  if (method === 'trim') {
    for (var i = 0; i < rows.length; i++) {
      for (var c = 0; c < ds.cols.length; c++) {
        var col = ds.cols[c]; var v = rows[i][col];
        if (typeof v === 'string' && hasSpace(v)) { rows[i][col] = v.trim(); setMark(i, col, 'c-space'); }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  /* ── 7. LOG ── */
  if (method === 'log1p') {
    for (var i = 0; i < rows.length; i++) {
      for (var c = 0; c < ds.numCols.length; c++) {
        var col = ds.numCols[c]; var v = rows[i][col];
        if (typeof v === 'number') { rows[i][col] = Math.log(1+Math.abs(v)); setMark(i, col, 'c-log'); }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  /* ── 8. Z-SCORE ── */
  if (method === 'zscore') {
    var stats = {};
    for (var c = 0; c < ds.numCols.length; c++) {
      var col = ds.numCols[c];
      stats[col] = {mu: colMean(orig, col), sigma: colStd(orig, col)};
    }
    for (var i = 0; i < rows.length; i++) {
      for (var c = 0; c < ds.numCols.length; c++) {
        var col = ds.numCols[c]; var v = rows[i][col];
        var sig = stats[col].sigma;
        if (typeof v === 'number' && sig !== 0) { rows[i][col] = (v - stats[col].mu)/sig; setMark(i, col, 'c-scale'); }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  /* ══════════════════════════════════════════════
     ── 9. DATES ──
  ══════════════════════════════════════════════ */
  if (method === 'date_parse') {
    for (var i = 0; i < rows.length; i++) {
      for (var c = 0; c < ds.cols.length; c++) {
        var col = ds.cols[c]; var v = rows[i][col];
        if (!isNull(v) && typeof v === 'string' && col !== 'id' && col !== 'client' && isNaN(Number(v))) {
          var parsed = parseDate(v);
          if (parsed !== v) { rows[i][col] = parsed; setMark(i, col, 'c-date'); }
        }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  if (method === 'date_extract') {
    /* first parse all dates, then extract components */
    var newCols = [];
    var dateCols = ['date_commande','date_livraison'];
    for (var d = 0; d < dateCols.length; d++) {
      var dcol = dateCols[d];
      if (ds.cols.indexOf(dcol) === -1) continue;
      newCols.push(dcol+'_annee', dcol+'_mois', dcol+'_jour');
    }
    for (var i = 0; i < rows.length; i++) {
      for (var d = 0; d < dateCols.length; d++) {
        var dcol = dateCols[d];
        if (ds.cols.indexOf(dcol) === -1) continue;
        var raw = rows[i][dcol];
        var iso = isNull(raw) ? null : parseDate(String(raw));
        if (iso && /^\d{4}-\d{2}-\d{2}$/.test(iso)) {
          var parts = iso.split('-');
          rows[i][dcol+'_annee'] = parseInt(parts[0]);
          rows[i][dcol+'_mois']  = parseInt(parts[1]);
          rows[i][dcol+'_jour']  = parseInt(parts[2]);
          setMark(i, dcol+'_annee', 'c-date-new');
          setMark(i, dcol+'_mois',  'c-date-new');
          setMark(i, dcol+'_jour',  'c-date-new');
        } else {
          rows[i][dcol+'_annee'] = null;
          rows[i][dcol+'_mois']  = null;
          rows[i][dcol+'_jour']  = null;
        }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:newCols};
  }

  if (method === 'date_diff') {
    var newCols = ['delai_livraison_jours'];
    for (var i = 0; i < rows.length; i++) {
      var d1 = isNull(rows[i].date_commande) ? null : parseDate(String(rows[i].date_commande));
      var d2 = isNull(rows[i].date_livraison) ? null : parseDate(String(rows[i].date_livraison));
      var diff = dateDiffDays(d1, d2);
      rows[i].delai_livraison_jours = diff;
      if (diff !== null) setMark(i, 'delai_livraison_jours', 'c-date-new');
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:newCols};
  }

  if (method === 'date_fill_fwd' || method === 'date_fill_bwd') {
    var dateCols2 = ['date_commande','date_livraison'];
    if (method === 'date_fill_fwd') {
      for (var d = 0; d < dateCols2.length; d++) {
        var dcol = dateCols2[d]; var last = null;
        for (var i = 0; i < rows.length; i++) {
          if (!isNull(rows[i][dcol])) last = rows[i][dcol];
          else if (last !== null) { rows[i][dcol] = last; setMark(i, dcol, 'c-date'); }
        }
      }
    } else {
      for (var d = 0; d < dateCols2.length; d++) {
        var dcol = dateCols2[d]; var next = null;
        for (var i = rows.length-1; i >= 0; i--) {
          if (!isNull(rows[i][dcol])) next = rows[i][dcol];
          else if (next !== null) { rows[i][dcol] = next; setMark(i, dcol, 'c-date'); }
        }
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  /* ══════════════════════════════════════════════
     ── 10. ENCODING ──
  ══════════════════════════════════════════════ */
  if (method === 'enc_onehot') {
    var newCols = [];
    /* only encode 'categorie' for readability */
    var encCol = 'categorie';
    var uniq = [];
    for (var i = 0; i < orig.length; i++) {
      var v = orig[i][encCol];
      if (!isNull(v) && uniq.indexOf(String(v)) === -1) uniq.push(String(v));
    }
    uniq.sort();
    for (var u = 0; u < uniq.length; u++) {
      var nc = encCol+'_'+uniq[u].replace(/\s/g,'_');
      newCols.push(nc);
      for (var i = 0; i < rows.length; i++) {
        rows[i][nc] = (rows[i][encCol] === uniq[u]) ? 1 : 0;
        setMark(i, nc, 'c-encoding');
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:newCols};
  }

  if (method === 'enc_label') {
    var newCols = [];
    var encCols = ds.catCols;
    for (var c = 0; c < encCols.length; c++) {
      var col = encCols[c];
      var uniq = [];
      for (var i = 0; i < orig.length; i++) {
        var v = orig[i][col];
        if (!isNull(v) && uniq.indexOf(String(v)) === -1) uniq.push(String(v));
      }
      uniq.sort();
      var nc = col+'_label';
      newCols.push(nc);
      for (var i = 0; i < rows.length; i++) {
        var v = rows[i][col];
        rows[i][nc] = isNull(v) ? null : (uniq.indexOf(String(v))+1);
        setMark(i, nc, 'c-encoding');
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:newCols};
  }

  if (method === 'enc_freq') {
    var newCols = [];
    var encCols = ds.catCols;
    for (var c = 0; c < encCols.length; c++) {
      var col = encCols[c];
      var freq = {};
      for (var i = 0; i < orig.length; i++) {
        var v = orig[i][col];
        if (!isNull(v)) { var k=String(v); freq[k]=(freq[k]||0)+1; }
      }
      var nc = col+'_freq';
      newCols.push(nc);
      for (var i = 0; i < rows.length; i++) {
        var v = rows[i][col];
        rows[i][nc] = isNull(v) ? null : +(freq[String(v)] / orig.length).toFixed(4);
        setMark(i, nc, 'c-encoding');
      }
    }
    return {after:rows, marks:marks, removedSet:{}, extraCols:newCols};
  }

  /* ══════════════════════════════════════════════
     ── 11. SEMANTIC ──
  ══════════════════════════════════════════════ */
  function applyAge(rows, marks, orig) {
    var validAges = [];
    for (var i = 0; i < orig.length; i++) { var a=orig[i].age; if(typeof a==='number'&&a>=0&&a<=120) validAges.push(a); }
    var medAge = 0;
    if (validAges.length) { var s=validAges.slice().sort(function(a,b){return a-b;}); medAge=s[Math.floor(s.length/2)]; }
    for (var i = 0; i < rows.length; i++) {
      var a = rows[i].age;
      if (typeof a === 'number' && (a < 0 || a > 120)) { rows[i].age = medAge; setMark(i, 'age', 'c-semantic'); }
    }
  }
  function applySalaire(rows, marks) {
    for (var i = 0; i < rows.length; i++) {
      var s = rows[i].salaire;
      if (typeof s === 'number' && s < 0) { rows[i].salaire = 0; setMark(i, 'salaire', 'c-semantic'); }
    }
  }
  function applyDateOrder(rows, marks) {
    for (var i = 0; i < rows.length; i++) {
      var dn = rows[i].date_naissance, de = rows[i].date_embauche;
      if (dn && de && dn >= de) {
        /* swap */
        rows[i].date_naissance = de; rows[i].date_embauche = dn;
        setMark(i, 'date_naissance', 'c-semantic'); setMark(i, 'date_embauche', 'c-semantic');
      }
    }
  }

  if (method === 'sem_age') { applyAge(rows, marks, orig); return {after:rows, marks:marks, removedSet:{}, extraCols:[]}; }
  if (method === 'sem_salaire') { applySalaire(rows, marks); return {after:rows, marks:marks, removedSet:{}, extraCols:[]}; }
  if (method === 'sem_date') { applyDateOrder(rows, marks); return {after:rows, marks:marks, removedSet:{}, extraCols:[]}; }
  if (method === 'sem_all') {
    applyAge(rows, marks, orig);
    applySalaire(rows, marks);
    applyDateOrder(rows, marks);
    return {after:rows, marks:marks, removedSet:{}, extraCols:[]};
  }

  return {after:rows, marks:{}, removedSet:{}, extraCols:[]};
}

/* ════════════════════════════════════════════════
   BUILD TABLE HTML
════════════════════════════════════════════════ */
function buildBefore(ds, result) {
  var cols = ds.cols;
  var orig = ds.rows;
  var h = '<thead><tr><th>#</th>';
  for (var c = 0; c < cols.length; c++) h += '<th>' + cols[c] + '</th>';
  h += '</tr></thead><tbody>';

  for (var i = 0; i < orig.length; i++) {
    var isRm  = result.removedSet[i];
    var isDup = (curMeth === 'drop_dup') && isRm;
    var trCls = isRm ? (isDup ? 'c-dup' : 'c-removed') : '';
    h += '<tr class="' + trCls + '"><td class="idx">' + (i+1) + '</td>';

    for (var c = 0; c < cols.length; c++) {
      var col = cols[c]; var v = orig[i][col];
      var tdCls = ''; var disp;

      if (isNull(v)) {
        tdCls = 'c-null'; disp = 'null';
      } else {
        /* semantic: mark bad values in before table */
        if (curCat.id === 'semantic') {
          if (col === 'age' && typeof v === 'number' && (v < 0 || v > 120)) tdCls = 'c-sem-bad';
          else if (col === 'salaire' && typeof v === 'number' && v < 0) tdCls = 'c-sem-bad';
          else if ((col === 'date_naissance' || col === 'date_embauche') && orig[i].date_naissance && orig[i].date_embauche && orig[i].date_naissance >= orig[i].date_embauche) tdCls = 'c-sem-bad';
        }
        /* other highlights in before */
        if (tdCls === '') {
          if (result.marks[i] && result.marks[i][col]) {
            if (curMeth === 'to_num' && isStrNum(v)) tdCls = 'c-type';
            else if ((curMeth==='txt_lower'||curMeth==='txt_upper'||curMeth==='txt_cap') && typeof v==='string') {
              var test = curMeth==='txt_lower'?v.toLowerCase():curMeth==='txt_upper'?v.toUpperCase():v.toLowerCase().replace(/(^|\s)\S/g,function(ch){return ch.toUpperCase();});
              if (test !== v) tdCls = 'c-text';
            }
            else if (curMeth === 'trim' && typeof v === 'string' && hasSpace(v)) tdCls = 'c-space';
            else if (curMeth === 'out_cap' || curMeth === 'out_median') {
              var b = iqrBounds(orig, col);
              if (b && typeof v === 'number' && (v<b.lo||v>b.hi)) tdCls = 'c-outlier';
            }
          }
          if (curMeth === 'out_drop' && isRm && typeof v === 'number') {
            var b2 = iqrBounds(orig, col);
            if (b2 && (v<b2.lo||v>b2.hi)) tdCls = 'c-outlier';
          }
        }

        if (typeof v === 'number') disp = fmtNum(v);
        else disp = (typeof v === 'string' && isStrNum(v)) ? '«' + v + '»' : String(v);
        if (typeof v === 'string' && hasSpace(v) && curMeth === 'trim') {
          tdCls = 'c-space';
          disp = '«' + String(v).replace(/ /g, '·') + '»';
        }
      }
      h += '<td class="' + tdCls + '">' + disp + '</td>';
    }
    h += '</tr>';
  }
  return h + '</tbody>';
}

function buildAfter(ds, result) {
  /* merge original cols + extra cols from method */
  var cols  = ds.cols.concat(result.extraCols);
  var after = result.after;
  var marks = result.marks;

  var h = '<thead><tr><th>#</th>';
  for (var c = 0; c < cols.length; c++) {
    var isNew = (result.extraCols.indexOf(cols[c]) > -1);
    h += '<th' + (isNew ? ' style="color:var(--a5)"' : '') + '>' + cols[c] + '</th>';
  }
  h += '</tr></thead><tbody>';

  var isRemoval = (curMeth === 'drop_rows' || curMeth === 'drop_dup' || curMeth === 'out_drop');

  for (var i = 0; i < after.length; i++) {
    h += '<tr><td class="idx">' + (i+1) + '</td>';
    for (var c = 0; c < cols.length; c++) {
      var col = cols[c]; var v = after[i][col];
      var tdCls = '';
      if (marks[i] && marks[i][col]) tdCls = marks[i][col];
      h += '<td class="' + tdCls + '">' + fmtVal(v) + '</td>';
    }
    h += '</tr>';
  }
  return h + '</tbody>';
}

/* ════════════════════════════════════════════════
   STATS CHIPS
════════════════════════════════════════════════ */
function renderChips(ds, result) {
  var orig = ds.rows;

  var missBefore = 0;
  for (var i = 0; i < orig.length; i++) {
    for (var c = 0; c < ds.cols.length; c++) { if (isNull(orig[i][ds.cols[c]])) missBefore++; }
  }
  var missAfter = 0;
  for (var i = 0; i < result.after.length; i++) {
    for (var c = 0; c < ds.cols.length; c++) { if (isNull(result.after[i][ds.cols[c]])) missAfter++; }
  }
  var typesBefore = 0;
  for (var i = 0; i < orig.length; i++) {
    for (var c = 0; c < ds.numCols.length; c++) { if (isStrNum(orig[i][ds.numCols[c]])) typesBefore++; }
  }
  var spacesBefore = 0;
  for (var i = 0; i < orig.length; i++) {
    for (var c = 0; c < ds.cols.length; c++) { var v=orig[i][ds.cols[c]]; if(typeof v==='string'&&hasSpace(v)) spacesBefore++; }
  }
  var dupsBefore = (curMeth === 'drop_dup') ? Object.keys(result.removedSet).length : 0;

  /* Category-specific stats */
  var extraItems = [];

  if (curCat.id === 'dates') {
    var formats = {};
    for (var i = 0; i < orig.length; i++) {
      for (var c = 0; c < ds.cols.length; c++) {
        var v = orig[i][ds.cols[c]];
        if (isNull(v) || typeof v !== 'string') continue;
        var col = ds.cols[c];
        if (col === 'id' || col === 'client' || !isNaN(Number(v))) continue;
        var fmt;
        if (/^\d{4}-\d{2}-\d{2}$/.test(v)) fmt = 'ISO';
        else if (/^\d{2}\/\d{2}\/\d{4}$/.test(v)) fmt = 'DD/MM/YYYY';
        else if (/^\d{2}-\d{2}-\d{4}$/.test(v)) fmt = 'DD-MM-YYYY';
        else if (/^\d{2}-[A-Za-z]{3}-\d{4}$/.test(v)) fmt = 'DD-Mon-YYYY';
        else fmt = 'autre';
        formats[fmt] = (formats[fmt]||0)+1;
      }
    }
    extraItems.push({lbl:'Formats differents', val: Object.keys(formats).length, cls:'ca2'});
    extraItems.push({lbl:'Dates nulles', val: missBefore, cls:'ca1'});
  }

  if (curCat.id === 'encoding') {
    var totalUniq = 0;
    for (var c = 0; c < ds.catCols.length; c++) {
      var seen = {};
      for (var i = 0; i < orig.length; i++) { var v=orig[i][ds.catCols[c]]; if(!isNull(v)) seen[v]=1; }
      totalUniq += Object.keys(seen).length;
    }
    extraItems.push({lbl:'Valeurs uniques totales', val: totalUniq, cls:'ca5'});
    extraItems.push({lbl:'Colonnes encodees', val: ds.catCols.length, cls:'ca2'});
    extraItems.push({lbl:'Nouvelles colonnes', val: result.extraCols.length, cls:'ca5'});
  }

  if (curCat.id === 'semantic') {
    var badAge=0, badSal=0, badDates=0;
    for (var i = 0; i < orig.length; i++) {
      var a=orig[i].age; if(typeof a==='number'&&(a<0||a>120)) badAge++;
      var s=orig[i].salaire; if(typeof s==='number'&&s<0) badSal++;
      if(orig[i].date_naissance&&orig[i].date_embauche&&orig[i].date_naissance>=orig[i].date_embauche) badDates++;
    }
    extraItems.push({lbl:'Ages invalides', val: badAge, cls:'ca1'});
    extraItems.push({lbl:'Salaires negatifs', val: badSal, cls:'ca1'});
    extraItems.push({lbl:'Dates incoherentes', val: badDates, cls:'ca4'});
  }

  var items = [
    {lbl:'Lignes avant', val: orig.length, cls:'cw'},
    {lbl:'Lignes apres', val: result.after.length, cls:'ca3'},
    {lbl:'Lignes modifiees', val: Object.keys(result.removedSet).length, cls:'ca1'},
    {lbl:'Valeurs null avant', val: missBefore, cls:'ca4'}
  ];
  if (missAfter !== missBefore) items.push({lbl:'Null apres', val: missAfter, cls:'ca3'});
  if (typesBefore > 0) items.push({lbl:'Erreurs de type', val: typesBefore, cls:'ca4'});
  if (spacesBefore > 0 && curMeth === 'trim') items.push({lbl:'Espaces nettoyes', val: spacesBefore, cls:'ca5'});
  if (dupsBefore > 0) items.push({lbl:'Doublons supprimes', val: dupsBefore, cls:'ca1'});
  for (var e = 0; e < extraItems.length; e++) items.push(extraItems[e]);

  var html = '';
  for (var i = 0; i < items.length; i++) {
    html += '<div class="chip"><div class="chip-lbl">' + items[i].lbl + '</div><div class="chip-val ' + items[i].cls + '">' + items[i].val + '</div></div>';
  }
  document.getElementById('chips').innerHTML = html;
}

/* ════════════════════════════════════════════════
   LEGEND
════════════════════════════════════════════════ */
var LEGENDS = {
  missing:   [{c:'var(--a1)',l:'Valeur null'},{c:'var(--a3)',l:'Valeur imputee'}],
  duplicates:[{c:'rgba(255,60,120,.4)',l:'Ligne dupliquee (avant)'},{c:'var(--muted)',l:'Supprimee dans apres'}],
  outliers:  [{c:'var(--a1)',l:'Outlier detecte'},{c:'var(--a4)',l:'Valeur corrigee'}],
  types:     [{c:'var(--a4)',l:'Nombre stocke en string'},{c:'var(--a4)',l:'Converti en number'}],
  text:      [{c:'var(--a5)',l:'Texte inconsistant'},{c:'var(--a5)',l:'Uniformise'}],
  spaces:    [{c:'var(--a5)',l:'Espace parasite (·)'},{c:'var(--a5)',l:'Espace nettoye'}],
  log:       [{c:'var(--a2)',l:'Valeur log-transformee'}],
  scaling:   [{c:'var(--a3)',l:'Valeur standardisee (Z-score)'}],
  dates:     [{c:'var(--a1)',l:'Valeur null'},{c:'var(--a2)',l:'Date parsee / remplie'},{c:'rgba(0,229,255,.5)',l:'Nouvelle colonne extraite'}],
  encoding:  [{c:'var(--a5)',l:'Colonne encodee (nouvelle)'}],
  semantic:  [{c:'var(--a1)',l:'Valeur semantiquement invalide'},{c:'var(--a4)',l:'Valeur corrigee'}]
};

function renderLegend() {
  var items = LEGENDS[curCat.id] || [];
  var html = '';
  for (var i = 0; i < items.length; i++) {
    html += '<div class="leg"><div class="leg-dot" style="background:'+items[i].c+'"></div>'+items[i].l+'</div>';
  }
  document.getElementById('legend').innerHTML = html;
}

/* ════════════════════════════════════════════════
   UI INIT
════════════════════════════════════════════════ */
function buildCatTabs() {
  var html = '';
  for (var i = 0; i < CATS.length; i++) {
    var c = CATS[i];
    var onCls = (c.id === curCat.id) ? ' on' : '';
    html += '<button class="ctab ' + c.cc + onCls + '" data-cat="' + c.id + '" onclick="selectCat(this)">' + c.label + '</button>';
  }
  document.getElementById('catTabs').innerHTML = html;
}

function buildDsSelect() {
  var sel = document.getElementById('selDs');
  sel.innerHTML = '';
  for (var i = 0; i < curCat.datasets.length; i++) {
    var key = curCat.datasets[i];
    var opt = document.createElement('option');
    opt.value = key; opt.textContent = DS[key].label;
    sel.appendChild(opt);
  }
  sel.value = curDsId;
}

function buildMethodSelect() {
  var sel = document.getElementById('selMethod');
  sel.innerHTML = '';
  for (var i = 0; i < curCat.methods.length; i++) {
    var m = curCat.methods[i];
    var opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.label;
    sel.appendChild(opt);
  }
  sel.value = curMeth;
  document.getElementById('constRow').className = 'const-row' + (curMeth === 'imp_const' ? ' show' : '');
}

function selectCat(btn) {
  var catId = btn.getAttribute('data-cat');
  for (var i = 0; i < CATS.length; i++) { if (CATS[i].id === catId) { curCat = CATS[i]; break; } }
  curDsId = curCat.datasets[0];
  curMeth = curCat.methods[0].id;
  buildCatTabs(); buildDsSelect(); buildMethodSelect(); render();
}
function onDsChange() { curDsId = document.getElementById('selDs').value; render(); }
function onMethodChange() {
  curMeth = document.getElementById('selMethod').value;
  document.getElementById('constRow').className = 'const-row' + (curMeth === 'imp_const' ? ' show' : '');
  render();
}

/* ════════════════════════════════════════════════
   MAIN RENDER
════════════════════════════════════════════════ */
function render() {
  var ds     = DS[curDsId];
  var result = applyMethod(curDsId, curMeth);
  var eb = document.getElementById('explainBox');
  var ex = EXPLAINS[curMeth];
  eb.textContent = ex || '';
  eb.style.display = ex ? 'block' : 'none';
  renderChips(ds, result);
  renderLegend();
  document.getElementById('tBefore').innerHTML = buildBefore(ds, result);
  document.getElementById('tAfter').innerHTML  = buildAfter(ds, result);
}

/* BOOT */
buildCatTabs(); buildDsSelect(); buildMethodSelect(); render();
</script>
</body>
</html>
